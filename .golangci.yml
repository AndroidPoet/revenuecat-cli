linters:
  enable:
    - errcheck
    - govet
    - staticcheck

linters-settings:
  errcheck:
    exclude-functions:
      - (*github.com/spf13/cobra.Command).MarkFlagRequired
      - (*github.com/spf13/cobra.Command).RegisterFlagCompletionFunc
      - github.com/spf13/viper.BindPFlag
      - github.com/spf13/viper.BindEnv
