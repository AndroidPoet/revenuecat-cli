<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#F8F9FA"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#grad)" />
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#4B48F2"/>
      <stop offset="50%" stop-color="#E8514A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <!-- RevenueCat icon representation -->
  <g transform="translate(600, 130)">
    <!-- Subscription/chart icon -->
    <rect x="-45" y="-45" width="90" height="90" rx="12" fill="#4B48F2" opacity="0.15"/>
    <path d="M-25,20 L-25,-20 L-5,-20 L-5,5 L15,5 L15,-10 L35,-10 L35,20 Z" fill="#4B48F2" opacity="0.8"/>
  </g>
  <!-- Title -->
  <text x="600" y="220" text-anchor="middle" fill="#1F2328" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">RevenueCat CLI</text>
  <!-- Subtitle -->
  <text x="600" y="258" text-anchor="middle" fill="#656D76" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" letter-spacing="0.3">Manage subscriptions from your terminal</text>
  <!-- Tagline -->
  <text x="600" y="295" text-anchor="middle" fill="#4B48F2" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" letter-spacing="0.5">Fast • Lightweight • Scriptable</text>
</svg>
